audio:
  sample_rate: 16000
  channels: 1
  frame_duration_seconds: 0.5
  arecord_binary: arecord
  arecord_device:
  retry_backoff_seconds: 5.0
  level_display_mode: calibrated
  calibration_slope: 2.88
  calibration_offset_db: 138.3

detection:
  initial_noise_floor_dbfs: -58.0
  activation_margin_db: 9.0
  release_margin_db: 4.0
  min_event_dbfs: -48.0
  min_active_frames: 2
  max_inactive_frames: 3
  noise_floor_alpha: 0.04

aggregation:
  noise_interval_seconds: 5.0
  pre_roll_seconds: 1.0
  post_roll_seconds: 1.0
  min_event_seconds: 1.0
  focus_clip_seconds: 8.0
  max_clip_seconds: 30.0
  max_event_seconds: 90.0

classifier:
  backend: yamnet
  reuse_similarity_threshold: 0.992
  reuse_confidence_threshold: 0.60
  similarity_cache_limit: 200
  similarity_lookback_days: 30
  yamnet_model_path: models/yamnet.tflite
  yamnet_class_map_path: models/yamnet_class_map.csv
  yamnet_model_url: https://tfhub.dev/google/lite-model/yamnet/classification/tflite/1?lite-format=tflite
  yamnet_class_map_url: https://raw.githubusercontent.com/tensorflow/models/master/research/audioset/yamnet/yamnet_class_map.csv
  yamnet_num_threads: 1
  yamnet_max_analysis_seconds: 12.0
  yamnet_max_windows: 24
  yamnet_min_category_score: 0.08
  yamnet_top_k: 8

storage:
  database_path: data/db/audio_monitor.sqlite3
  clip_dir: data/clips
  keep_clips: true
  clip_max_megabytes: 1024
  clip_max_age_days: 14
  min_free_disk_megabytes: 512

web:
  host: 0.0.0.0
  port: 8080
  recent_events_limit: 20
  dashboard_history_hours: 24

logging:
  level: INFO
